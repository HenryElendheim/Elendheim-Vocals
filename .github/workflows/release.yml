name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release, for example 1.0"
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - run: ./gradlew assembleRelease --stacktrace
      - name: Create release with APK
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ inputs.version }}
        run: |
          apk="Elendheim-Vocal-Range-v${VERSION}.apk"
          cp app/build/outputs/apk/release/app-release.apk "$apk"
          gh release create "v${VERSION}" "$apk" \
            --target "$GITHUB_SHA" \
            --title "Elendheim Vocal Range v${VERSION}" \
            --notes "Elendheim Vocal Range is an Android app that finds your singing range. It shows the note you are singing live in a big circle, captures your range from your lowest note to your highest, and has challenges for hitting and holding notes. Sessions are saved so you can track your range over time, and you can export and import them from settings. Download the APK below to install it."
